<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pointage Hafid Pro</title>
    <style>
        body { background-color: #0f1218; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .header-box { background: rgba(25, 33, 50, 0.85); padding: 15px; border-radius: 18px; width: 95%; max-width: 380px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .header-box h2 { margin: 0; font-size: 1.1rem; color: #4A90E2; }
        .header-box h2 span { color: white; }
        .table-container { background: rgba(30, 37, 50, 0.5); border-radius: 20px; width: 95%; max-width: 380px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .labels-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; padding-bottom: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 10px; }
        .label { font-size: 0.65rem; color: #4A90E2; text-align: center; font-weight: bold; }
        .data-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 8px; }
        input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #FFD700; padding: 8px 2px; font-size: 0.75rem; text-align: center; width: 100%; outline: none; }
        .btn-pdf { background: #00A651; border-radius: 8px; padding: 6px 12px; border: none; color: white; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .footer-name { margin-top: 15px; font-size: 0.6rem; color: rgba(255, 255, 255, 0.2); text-align: right; width: 95%; }

        /* إعدادات الطباعة باش يخرج PDF ناضي */
        @media print {
            body { background: white !important; color: black !important; }
            .actions, .btn-small, .btn-pdf { display: none !important; }
            .table-container { background: white !important; border: none !important; width: 100% !important; max-width: none !important; }
            input { border: 1px solid #ccc !important; color: black !important; background: white !important; }
            .label { color: black !important; }
            .header-box { background: white !important; border: none !important; color: black !important; }
            .header-box h2, .header-box h2 span { color: black !important; }
        }
    </style>
</head>
<body>
    <div class="header-box">
        <h2>POINTAGE <span>HAFID</span></h2>
        <button class="btn-pdf" onclick="window.print()">TÉLÉCHARGER PDF</button>
    </div>
    <div class="table-container">
        <div class="labels-row"><div class="label">DATE</div><div class="label">STATUT</div><div class="label">H/E</div><div class="label">H/S</div></div>
        <div id="tableBody"></div>
    </div>
    <div class="footer-name">HFID SAJIDI</div>

    <script>
        function addRow(data = ["", "", "", ""]) {
            const row = document.createElement('div');
            row.className = 'data-row';
            row.innerHTML = `<input type="text" value="${data[0]}" oninput="save()">
                             <input type="text" value="${data[1]}" oninput="save()">
                             <input type="text" value="${data[2]}" oninput="save()">
                             <input type="text" value="${data[3]}" oninput="save()">`;
            document.getElementById('tableBody').appendChild(row);
        }
        function save() {
            const rows = Array.from(document.querySelectorAll('.data-row')).map(r => Array.from(r.querySelectorAll('input')).map(i => i.value));
            localStorage.setItem('h_data', JSON.stringify(rows));
        }
        const saved = localStorage.getItem('h_data');
        if (saved) JSON.parse(saved).forEach(r => addRow(r)); else for(let i=0; i<10; i++) addRow();
    </script>
</body>
</html>
